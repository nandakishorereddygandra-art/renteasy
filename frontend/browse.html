<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Rentals - RentEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RentEasy</div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">Home</a>
                <a href="browse.html" class="nav-btn active">Browse Rentals</a>
                <a href="list-rental.html" class="nav-btn">List Rentals</a>
                <a href="about.html" class="nav-btn">About Us</a>
                <a href="profile.html" class="nav-btn">Profile</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h2>Browse Available Rentals</h2>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search by product name..." class="search-input">
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Tools">Tools</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Sports">Sports</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div id="rentalsList" class="rentals-grid"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
